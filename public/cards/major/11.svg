<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border11" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border11)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XI</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Seated figure with sword and scales -->
  <g transform="translate(120,165)">
    <!-- Pillars -->
    <rect x="-45" y="-45" width="8" height="75" rx="2" fill="#9CA3AF" opacity="0.2"/>
    <rect x="37" y="-45" width="8" height="75" rx="2" fill="#9CA3AF" opacity="0.2"/>
    <!-- Veil -->
    <rect x="-37" y="-45" width="74" height="8" rx="2" fill="#8B5CF6" opacity="0.08"/>
    <!-- Crown -->
    <rect x="-8" y="-55" width="16" height="6" rx="1" fill="#D4A843" opacity="0.5"/>
    <!-- Figure -->
    <circle cx="0" cy="-40" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="5" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Robes -->
    <path d="M0,5 Q-15,15 -18,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M0,5 Q15,15 18,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Raised sword (right hand) -->
    <line x1="8" y1="-20" x2="22" y2="-55" stroke="#9CA3AF" stroke-width="2.5"/>
    <line x1="18" y1="-48" x2="26" y2="-48" stroke="#9CA3AF" stroke-width="2"/>
    <!-- Scales (left hand) -->
    <line x1="-8" y1="-20" x2="-25" y2="-25" stroke="#D4A843" stroke-width="2"/>
    <!-- Scale beam -->
    <line x1="-40" y1="-25" x2="-10" y2="-25" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Scale pivot -->
    <circle cx="-25" cy="-25" r="2" fill="#D4A843"/>
    <!-- Left pan -->
    <path d="M-40,-25 L-44,-18 L-36,-18 Z" fill="none" stroke="#D4A843" stroke-width="1"/>
    <!-- Right pan -->
    <path d="M-10,-25 L-14,-18 L-6,-18 Z" fill="none" stroke="#D4A843" stroke-width="1"/>
    <!-- Square on chest (truth) -->
    <rect x="-4" y="-25" width="8" height="8" rx="1" fill="none" stroke="#DC2626" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">Justice</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">정의</text>
</svg>