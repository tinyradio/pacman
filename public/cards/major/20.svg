<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border20" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border20)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XX</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Angel blowing trumpet, figures rising from coffins, mountains -->
  <g transform="translate(120,160)">
    <!-- Clouds -->
    <ellipse cx="-20" cy="-55" rx="20" ry="8" fill="#9CA3AF" opacity="0.1"/>
    <ellipse cx="20" cy="-55" rx="20" ry="8" fill="#9CA3AF" opacity="0.1"/>
    <ellipse cx="0" cy="-50" rx="25" ry="10" fill="#9CA3AF" opacity="0.1"/>
    <!-- Angel -->
    <circle cx="0" cy="-50" r="10" fill="none" stroke="#D4A843" stroke-width="2"/>
    <!-- Halo -->
    <circle cx="0" cy="-50" r="14" fill="#FCD34D" opacity="0.1" stroke="#D4A843" stroke-width="1"/>
    <!-- Wings -->
    <path d="M-10,-48 Q-30,-60 -35,-42 Q-28,-40 -10,-44" fill="#D4A843" opacity="0.08" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M10,-48 Q30,-60 35,-42 Q28,-40 10,-44" fill="#D4A843" opacity="0.08" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Angel body -->
    <line x1="0" y1="-40" x2="0" y2="-25" stroke="#D4A843" stroke-width="2"/>
    <path d="M0,-25 Q-10,-20 -15,-15" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M0,-25 Q10,-20 15,-15" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Trumpet -->
    <line x1="8" y1="-42" x2="25" y2="-35" stroke="#D4A843" stroke-width="2"/>
    <polygon points="25,-38 35,-42 35,-28 25,-32" fill="#D4A843" opacity="0.2" stroke="#D4A843" stroke-width="1"/>
    <!-- Cross on flag from trumpet -->
    <rect x="30" y="-50" width="12" height="15" rx="1" fill="white" opacity="0.5" stroke="#DC2626" stroke-width="1"/>
    <line x1="34" y1="-50" x2="34" y2="-35" stroke="#DC2626" stroke-width="1"/>
    <line x1="30" y1="-42" x2="42" y2="-42" stroke="#DC2626" stroke-width="1"/>
    <!-- Sound waves -->
    <path d="M35,-30 Q40,-25 35,-20" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
    <path d="M38,-32 Q45,-25 38,-18" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.2"/>
    <!-- Mountains/land -->
    <polygon points="-55,30 -40,10 -25,30" fill="#9CA3AF" opacity="0.1"/>
    <polygon points="25,30 40,10 55,30" fill="#9CA3AF" opacity="0.1"/>
    <!-- Sea -->
    <ellipse cx="0" cy="35" rx="50" ry="8" fill="#60A5FA" opacity="0.08"/>
    <!-- Three figures rising from coffins -->
    <!-- Center figure (child) -->
    <rect x="-5" y="15" width="10" height="20" rx="1" fill="#9CA3AF" opacity="0.15" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="0" cy="10" r="5" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="0" y1="15" x2="0" y2="22" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="0" y1="17" x2="-5" y2="12" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="0" y1="17" x2="5" y2="12" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Left figure -->
    <rect x="-35" y="10" width="12" height="22" rx="1" fill="#9CA3AF" opacity="0.15" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="-29" cy="5" r="5" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-29" y1="10" x2="-29" y2="20" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-29" y1="13" x2="-34" y2="8" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-29" y1="13" x2="-24" y2="8" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Right figure -->
    <rect x="23" y="10" width="12" height="22" rx="1" fill="#9CA3AF" opacity="0.15" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="29" cy="5" r="5" fill="none" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="29" y1="10" x2="29" y2="20" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="29" y1="13" x2="24" y2="8" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="29" y1="13" x2="34" y2="8" stroke="#E879A8" stroke-width="1.5"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">Judgement</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">심판</text>
</svg>