<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border4)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">IV</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Stone throne, rams, ankh, authority -->
  <g transform="translate(120,165)">
    <!-- Stone throne -->
    <rect x="-35" y="-40" width="70" height="75" rx="3" fill="#9CA3AF" opacity="0.2" stroke="#9CA3AF" stroke-width="1.5"/>
    <rect x="-35" y="-40" width="10" height="75" rx="2" fill="#9CA3AF" opacity="0.3"/>
    <rect x="25" y="-40" width="10" height="75" rx="2" fill="#9CA3AF" opacity="0.3"/>
    <!-- Ram heads on throne -->
    <circle cx="-30" cy="-35" r="6" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M-36,-38 Q-40,-45 -34,-45" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <circle cx="30" cy="-35" r="6" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M36,-38 Q40,-45 34,-45" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Crown -->
    <path d="M-10,-58 L-6,-65 L0,-58 L6,-65 L10,-58" fill="none" stroke="#D4A843" stroke-width="2"/>
    <line x1="-10" y1="-58" x2="10" y2="-58" stroke="#D4A843" stroke-width="2"/>
    <!-- Figure -->
    <circle cx="0" cy="-45" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-35" x2="0" y2="5" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Armor cross -->
    <line x1="-6" y1="-25" x2="6" y2="-25" stroke="#DC2626" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="-20" stroke="#DC2626" stroke-width="2"/>
    <!-- Legs crossed -->
    <line x1="0" y1="5" x2="-12" y2="30" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="5" x2="12" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="12" y1="25" x2="5" y2="30" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Ankh scepter -->
    <line x1="15" y1="-20" x2="35" y2="-40" stroke="#D4A843" stroke-width="2"/>
    <circle cx="37" cy="-44" r="5" fill="none" stroke="#D4A843" stroke-width="2"/>
    <line x1="34" y1="-39" x2="40" y2="-39" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Globe in other hand -->
    <circle cx="-18" cy="-10" r="6" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Mountains background -->
    <polygon points="-55,35 -40,10 -25,35" fill="#9CA3AF" opacity="0.15"/>
    <polygon points="25,35 40,15 55,35" fill="#9CA3AF" opacity="0.15"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Emperor</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">황제</text>
</svg>