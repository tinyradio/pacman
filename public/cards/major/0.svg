<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border0" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border0)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Corner ornaments -->
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <!-- Roman numeral -->
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">0</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center symbol: A figure stepping off a cliff with a sun -->
  <g transform="translate(120,175)">
    <circle cx="0" cy="-50" r="18" fill="none" stroke="#D4A843" stroke-width="2"/>
    <circle cx="0" cy="-50" r="12" fill="#FCD34D" opacity="0.4"/>
    <!-- Rays -->
    <line x1="0" y1="-72" x2="0" y2="-80" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="15" y1="-65" x2="20" y2="-72" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-15" y1="-65" x2="-20" y2="-72" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="18" y1="-50" x2="26" y2="-50" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-18" y1="-50" x2="-26" y2="-50" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Figure -->
    <circle cx="0" cy="-15" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-7" x2="0" y2="20" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="5" x2="-15" y2="-5" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="5" x2="15" y2="0" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="20" x2="-10" y2="35" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="20" x2="10" y2="35" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Cliff edge -->
    <line x1="-40" y1="40" x2="5" y2="40" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="5" y1="40" x2="5" y2="60" stroke="#9CA3AF" stroke-width="2"/>
    <!-- Small bundle on stick -->
    <line x1="15" y1="0" x2="30" y2="-20" stroke="#D4A843" stroke-width="1.5"/>
    <circle cx="32" cy="-23" r="6" fill="#D4A843" opacity="0.3" stroke="#D4A843" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <!-- English name -->
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Fool</text>
  <!-- Korean name -->
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">바보</text>
</svg>