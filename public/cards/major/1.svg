<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border1)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">I</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center symbol: Infinity symbol above figure with wand, table with suit symbols -->
  <g transform="translate(120,170)">
    <!-- Infinity / lemniscate above head -->
    <ellipse cx="-10" cy="-65" rx="12" ry="7" fill="none" stroke="#D4A843" stroke-width="2" transform="rotate(-15,-10,-65)"/>
    <ellipse cx="10" cy="-65" rx="12" ry="7" fill="none" stroke="#D4A843" stroke-width="2" transform="rotate(15,10,-65)"/>
    <!-- Figure -->
    <circle cx="0" cy="-40" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Raised wand -->
    <line x1="0" y1="-15" x2="18" y2="-55" stroke="#D4A843" stroke-width="2.5"/>
    <circle cx="19" cy="-58" r="3" fill="#FCD34D"/>
    <!-- Other arm pointing down -->
    <line x1="0" y1="-15" x2="-15" y2="5" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Table -->
    <rect x="-35" y="15" width="70" height="6" rx="2" fill="#8B5CF6" opacity="0.3" stroke="#8B5CF6" stroke-width="1"/>
    <!-- Suit symbols on table -->
    <circle cx="-20" cy="12" r="5" fill="#FCD34D" opacity="0.5"/>
    <rect x="-5" y="7" width="10" height="10" rx="1" fill="#8B5CF6" opacity="0.3"/>
    <polygon points="20,7 25,17 15,17" fill="#D4A843" opacity="0.5"/>
    <!-- Legs -->
    <line x1="0" y1="10" x2="-8" y2="30" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="10" x2="8" y2="30" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Flowers top and bottom -->
    <circle cx="-30" cy="-50" r="3" fill="#E879A8" opacity="0.4"/>
    <circle cx="30" cy="35" r="3" fill="#E879A8" opacity="0.4"/>
    <circle cx="-25" cy="35" r="3" fill="#E879A8" opacity="0.4"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Magician</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">마법사</text>
</svg>