<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border7)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">VII</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Chariot with sphinxes, canopy, star crown -->
  <g transform="translate(120,170)">
    <!-- Canopy/stars above -->
    <rect x="-35" y="-60" width="70" height="8" rx="2" fill="#8B5CF6" opacity="0.15" stroke="#8B5CF6" stroke-width="1"/>
    <polygon points="-25,-56 -23,-50 -27,-50" fill="#D4A843" opacity="0.6"/>
    <polygon points="-10,-56 -8,-50 -12,-50" fill="#D4A843" opacity="0.6"/>
    <polygon points="5,-56 7,-50 3,-50" fill="#D4A843" opacity="0.6"/>
    <polygon points="20,-56 22,-50 18,-50" fill="#D4A843" opacity="0.6"/>
    <!-- Pillars -->
    <line x1="-35" y1="-60" x2="-35" y2="-10" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="35" y1="-60" x2="35" y2="-10" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Star crown -->
    <polygon points="0,-50 3,-42 -3,-42" fill="#D4A843"/>
    <!-- Figure (warrior) -->
    <circle cx="0" cy="-35" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="-12" y="-27" width="24" height="18" rx="2" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Armor detail -->
    <line x1="-6" y1="-22" x2="6" y2="-22" stroke="#D4A843" stroke-width="1"/>
    <!-- Chariot body -->
    <rect x="-35" y="-10" width="70" height="25" rx="4" fill="#D4A843" opacity="0.15" stroke="#D4A843" stroke-width="2"/>
    <!-- Winged disc on chariot -->
    <circle cx="0" cy="2" r="6" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M-6,2 Q-15,-5 -20,2" fill="none" stroke="#D4A843" stroke-width="1"/>
    <path d="M6,2 Q15,-5 20,2" fill="none" stroke="#D4A843" stroke-width="1"/>
    <!-- Wheels -->
    <circle cx="-30" cy="18" r="8" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="-30" y1="10" x2="-30" y2="26" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="-38" y1="18" x2="-22" y2="18" stroke="#9CA3AF" stroke-width="1"/>
    <circle cx="30" cy="18" r="8" fill="none" stroke="#9CA3AF" stroke-width="2"/>
    <line x1="30" y1="10" x2="30" y2="26" stroke="#9CA3AF" stroke-width="1"/>
    <line x1="22" y1="18" x2="38" y2="18" stroke="#9CA3AF" stroke-width="1"/>
    <!-- Sphinxes -->
    <ellipse cx="-20" cy="35" rx="12" ry="7" fill="#1a1a2e" opacity="0.3"/>
    <ellipse cx="20" cy="35" rx="12" ry="7" fill="#e0e0e0" opacity="0.4"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Chariot</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">전차</text>
</svg>