<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border6)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">VI</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Angel above, two figures, trees -->
  <g transform="translate(120,160)">
    <!-- Angel/Cupid above -->
    <circle cx="0" cy="-60" r="10" fill="none" stroke="#D4A843" stroke-width="2"/>
    <circle cx="0" cy="-60" r="6" fill="#FCD34D" opacity="0.3"/>
    <!-- Wings -->
    <path d="M-10,-60 Q-25,-75 -20,-55" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M10,-60 Q25,-75 20,-55" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Rays from angel -->
    <line x1="-8" y1="-48" x2="-15" y2="-40" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="-48" x2="0" y2="-40" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
    <line x1="8" y1="-48" x2="15" y2="-40" stroke="#FCD34D" stroke-width="1" opacity="0.5"/>
    <!-- Two figures -->
    <!-- Figure 1 (left) -->
    <circle cx="-20" cy="-15" r="8" fill="none" stroke="#E879A8" stroke-width="2"/>
    <line x1="-20" y1="-7" x2="-20" y2="20" stroke="#E879A8" stroke-width="2"/>
    <line x1="-20" y1="20" x2="-28" y2="40" stroke="#E879A8" stroke-width="2"/>
    <line x1="-20" y1="20" x2="-12" y2="40" stroke="#E879A8" stroke-width="2"/>
    <!-- Figure 2 (right) -->
    <circle cx="20" cy="-15" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="20" y1="-7" x2="20" y2="20" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="20" y1="20" x2="12" y2="40" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="20" y1="20" x2="28" y2="40" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Hands reaching toward each other -->
    <line x1="-12" y1="0" x2="-5" y2="-5" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="12" y1="0" x2="5" y2="-5" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Heart between them -->
    <path d="M-3,-5 C-3,-10 3,-10 3,-5 C3,0 0,4 0,4 C0,4 -3,0 -3,-5" fill="#E879A8" opacity="0.3" stroke="#E879A8" stroke-width="1"/>
    <!-- Tree of knowledge (left) -->
    <line x1="-42" y1="40" x2="-42" y2="0" stroke="#4ADE80" stroke-width="2" opacity="0.4"/>
    <circle cx="-42" cy="-5" r="10" fill="#4ADE80" opacity="0.15"/>
    <!-- Tree of life (right) -->
    <line x1="42" y1="40" x2="42" y2="0" stroke="#4ADE80" stroke-width="2" opacity="0.4"/>
    <circle cx="42" cy="-5" r="10" fill="#DC2626" opacity="0.1"/>
    <circle cx="42" cy="-10" r="2" fill="#DC2626" opacity="0.3"/>
    <circle cx="38" cy="-2" r="2" fill="#DC2626" opacity="0.3"/>
    <circle cx="46" cy="-2" r="2" fill="#DC2626" opacity="0.3"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Lovers</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">연인</text>
</svg>