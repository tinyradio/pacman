<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border18" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border18)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XVIII</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Moon with face, drops falling, two towers, dog and wolf, crayfish, path -->
  <g transform="translate(120,160)">
    <!-- Moon (crescent with face) -->
    <circle cx="0" cy="-50" r="20" fill="#FCD34D" opacity="0.15"/>
    <circle cx="0" cy="-50" r="18" fill="none" stroke="#D4A843" stroke-width="2"/>
    <!-- Crescent overlay -->
    <circle cx="5" cy="-52" r="14" fill="#f5f0e8" opacity="0.6"/>
    <!-- Moon face hint -->
    <circle cx="-4" cy="-53" r="1.5" fill="#D4A843" opacity="0.5"/>
    <path d="M-6,-47 Q-3,-44 0,-47" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.5"/>
    <!-- Drops falling from moon -->
    <path d="M-15,-30 L-13,-25 L-11,-30" fill="#FCD34D" opacity="0.3"/>
    <path d="M0,-28 L2,-23 L4,-28" fill="#FCD34D" opacity="0.3"/>
    <path d="M10,-30 L12,-25 L14,-30" fill="#FCD34D" opacity="0.3"/>
    <path d="M-8,-25 L-6,-20 L-4,-25" fill="#FCD34D" opacity="0.2"/>
    <path d="M5,-25 L7,-20 L9,-25" fill="#FCD34D" opacity="0.2"/>
    <!-- Two towers -->
    <rect x="-48" y="-15" width="14" height="35" rx="2" fill="#9CA3AF" opacity="0.2" stroke="#9CA3AF" stroke-width="1.5"/>
    <rect x="-51" y="-18" width="20" height="5" rx="1" fill="#9CA3AF" opacity="0.25"/>
    <rect x="34" y="-15" width="14" height="35" rx="2" fill="#9CA3AF" opacity="0.2" stroke="#9CA3AF" stroke-width="1.5"/>
    <rect x="31" y="-18" width="20" height="5" rx="1" fill="#9CA3AF" opacity="0.25"/>
    <!-- Dog (left) howling -->
    <ellipse cx="-25" cy="10" rx="10" ry="7" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <circle cx="-30" cy="5" r="5" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-25" y1="17" x2="-28" y2="28" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="-20" y1="17" x2="-18" y2="28" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Wolf (right) howling -->
    <ellipse cx="25" cy="10" rx="10" ry="7" fill="none" stroke="#4A3728" stroke-width="1.5"/>
    <circle cx="30" cy="5" r="5" fill="none" stroke="#4A3728" stroke-width="1.5"/>
    <line x1="25" y1="17" x2="22" y2="28" stroke="#4A3728" stroke-width="1.5"/>
    <line x1="30" y1="17" x2="32" y2="28" stroke="#4A3728" stroke-width="1.5"/>
    <!-- Path between them -->
    <path d="M0,50 Q-5,40 0,30 Q5,20 0,10" fill="none" stroke="#D4A843" stroke-width="2" opacity="0.3"/>
    <!-- Pool with crayfish -->
    <ellipse cx="0" cy="45" rx="25" ry="10" fill="#60A5FA" opacity="0.1" stroke="#60A5FA" stroke-width="1"/>
    <!-- Crayfish -->
    <ellipse cx="0" cy="42" rx="6" ry="4" fill="none" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>
    <line x1="-6" y1="40" x2="-12" y2="36" stroke="#DC2626" stroke-width="1" opacity="0.5"/>
    <line x1="6" y1="40" x2="12" y2="36" stroke="#DC2626" stroke-width="1" opacity="0.5"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Moon</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">달</text>
</svg>