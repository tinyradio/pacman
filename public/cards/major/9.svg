<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border9" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border9)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">IX</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Cloaked figure on mountain, lantern with six-pointed star -->
  <g transform="translate(120,170)">
    <!-- Mountain -->
    <polygon points="-55,50 0,-10 55,50" fill="#9CA3AF" opacity="0.15" stroke="#9CA3AF" stroke-width="1"/>
    <polygon points="-40,50 -5,5 30,50" fill="#9CA3AF" opacity="0.1"/>
    <!-- Snow cap -->
    <polygon points="-5,5 0,-10 5,5" fill="white" opacity="0.3"/>
    <!-- Cloaked figure -->
    <circle cx="0" cy="-35" r="9" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Hood -->
    <path d="M-9,-38 Q0,-50 9,-38" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Cloak body -->
    <path d="M-9,-30 L-15,15 L0,20 L15,15 L9,-30" fill="#8B5CF6" opacity="0.1" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Staff -->
    <line x1="-12" y1="-20" x2="-20" y2="30" stroke="#D4A843" stroke-width="2.5"/>
    <!-- Lantern held high -->
    <line x1="8" y1="-25" x2="20" y2="-50" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="14" y="-62" width="14" height="16" rx="2" fill="none" stroke="#D4A843" stroke-width="2"/>
    <!-- Light glow -->
    <circle cx="21" cy="-54" r="10" fill="#FCD34D" opacity="0.15"/>
    <!-- Six-pointed star in lantern -->
    <polygon points="21,-57 23,-52 19,-52" fill="none" stroke="#D4A843" stroke-width="1"/>
    <polygon points="21,-51 23,-56 19,-56" fill="none" stroke="#D4A843" stroke-width="1"/>
    <!-- Stars in sky -->
    <circle cx="-35" cy="-55" r="2" fill="#D4A843" opacity="0.4"/>
    <circle cx="40" cy="-45" r="2" fill="#D4A843" opacity="0.4"/>
    <circle cx="-20" cy="-65" r="1.5" fill="#D4A843" opacity="0.3"/>
    <circle cx="30" cy="-60" r="1.5" fill="#D4A843" opacity="0.3"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Hermit</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">은둔자</text>
</svg>