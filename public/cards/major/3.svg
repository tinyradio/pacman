<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border3)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">III</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Venus symbol, wheat, cushioned throne, nature -->
  <g transform="translate(120,165)">
    <!-- Lush nature background -->
    <ellipse cx="0" cy="30" rx="55" ry="25" fill="#86EFAC" opacity="0.15"/>
    <!-- Trees -->
    <polygon points="-50,-20 -45,10 -55,10" fill="#4ADE80" opacity="0.3"/>
    <polygon points="50,-20 55,10 45,10" fill="#4ADE80" opacity="0.3"/>
    <!-- Crown with stars -->
    <circle cx="-8" cy="-52" r="3" fill="#D4A843"/>
    <circle cx="0" cy="-58" r="3" fill="#D4A843"/>
    <circle cx="8" cy="-52" r="3" fill="#D4A843"/>
    <path d="M-12,-48 L-8,-55 L0,-60 L8,-55 L12,-48" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Figure -->
    <circle cx="0" cy="-35" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-25" x2="0" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Flowing robe -->
    <path d="M0,10 Q-20,15 -25,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M0,10 Q20,15 25,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Scepter with Venus symbol -->
    <line x1="12" y1="-20" x2="30" y2="-40" stroke="#D4A843" stroke-width="2"/>
    <circle cx="32" cy="-45" r="6" fill="none" stroke="#D4A843" stroke-width="2"/>
    <line x1="32" y1="-39" x2="32" y2="-30" stroke="#D4A843" stroke-width="2"/>
    <line x1="28" y1="-34" x2="36" y2="-34" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Wheat stalks -->
    <line x1="-25" y1="35" x2="-20" y2="5" stroke="#D4A843" stroke-width="1"/>
    <ellipse cx="-19" cy="2" rx="2" ry="5" fill="#D4A843" opacity="0.5"/>
    <line x1="-30" y1="35" x2="-28" y2="8" stroke="#D4A843" stroke-width="1"/>
    <ellipse cx="-27" cy="5" rx="2" ry="5" fill="#D4A843" opacity="0.5"/>
    <!-- Heart shield -->
    <path d="M-6,-15 L0,-22 L6,-15 L0,-5 Z" fill="#E879A8" opacity="0.3" stroke="#E879A8" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Empress</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">여황제</text>
</svg>