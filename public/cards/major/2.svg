<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border2)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">II</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center symbol: Crescent moon, pillars, scroll, veil -->
  <g transform="translate(120,170)">
    <!-- Two pillars -->
    <rect x="-45" y="-50" width="12" height="80" rx="3" fill="#1a1a2e" opacity="0.7"/>
    <text x="-39" y="-35" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#f5f0e8">B</text>
    <rect x="33" y="-50" width="12" height="80" rx="3" fill="#e0e0e0" opacity="0.8"/>
    <text x="39" y="-35" text-anchor="middle" font-family="Georgia, serif" font-size="10" font-weight="bold" fill="#333">J</text>
    <!-- Veil between pillars -->
    <path d="M-33,-50 Q-20,-40 -10,-50 Q0,-40 10,-50 Q20,-40 33,-50" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5"/>
    <!-- Seated figure -->
    <circle cx="0" cy="-25" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-15" x2="0" y2="15" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="0" x2="-15" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="0" x2="15" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Crown with crescent -->
    <circle cx="0" cy="-42" r="8" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <circle cx="0" cy="-42" r="5" fill="#D4A843" opacity="0.2"/>
    <path d="M-5,-42 A5,5 0 0,1 5,-42" fill="none" stroke="#D4A843" stroke-width="2"/>
    <!-- Scroll -->
    <rect x="-8" y="5" width="16" height="22" rx="2" fill="#f5f0e8" stroke="#8B5CF6" stroke-width="1"/>
    <text x="0" y="20" text-anchor="middle" font-family="Georgia, serif" font-size="7" fill="#8B5CF6">TORA</text>
    <!-- Cross on chest -->
    <line x1="-4" y1="-12" x2="4" y2="-12" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="0" y1="-16" x2="0" y2="-8" stroke="#D4A843" stroke-width="1.5"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="308" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#4A3728">The High Priestess</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">여사제</text>
</svg>