<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border12" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border12)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XII</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Figure hanging upside down from T-shaped tree, halo -->
  <g transform="translate(120,165)">
    <!-- T-shaped wooden beam -->
    <line x1="-35" y1="-55" x2="35" y2="-55" stroke="#8B6914" stroke-width="4"/>
    <line x1="-30" y1="-55" x2="-30" y2="-65" stroke="#8B6914" stroke-width="3"/>
    <line x1="30" y1="-55" x2="30" y2="-65" stroke="#8B6914" stroke-width="3"/>
    <!-- Leaves on beam -->
    <ellipse cx="-35" cy="-58" rx="4" ry="6" fill="#4ADE80" opacity="0.3"/>
    <ellipse cx="35" cy="-58" rx="4" ry="6" fill="#4ADE80" opacity="0.3"/>
    <ellipse cx="-30" cy="-68" rx="4" ry="5" fill="#4ADE80" opacity="0.3"/>
    <ellipse cx="30" cy="-68" rx="4" ry="5" fill="#4ADE80" opacity="0.3"/>
    <!-- Rope -->
    <line x1="0" y1="-55" x2="0" y2="-40" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Hanging figure (upside down) -->
    <!-- Right foot tied (at top) -->
    <line x1="0" y1="-40" x2="0" y2="-20" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Left leg crossed behind -->
    <line x1="0" y1="-30" x2="-12" y2="-40" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Body -->
    <line x1="0" y1="-20" x2="0" y2="15" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Arms behind back (forming triangle) -->
    <line x1="0" y1="0" x2="-15" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="0" x2="15" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="-15" y1="10" x2="-10" y2="18" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="15" y1="10" x2="10" y2="18" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Head (at bottom, with halo) -->
    <circle cx="0" cy="25" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Halo glow -->
    <circle cx="0" cy="25" r="16" fill="#FCD34D" opacity="0.15"/>
    <circle cx="0" cy="25" r="16" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Serene face -->
    <circle cx="-3" cy="23" r="1" fill="#8B5CF6"/>
    <circle cx="3" cy="23" r="1" fill="#8B5CF6"/>
    <path d="M-3,28 Q0,31 3,28" fill="none" stroke="#8B5CF6" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="308" text-anchor="middle" font-family="Georgia, serif" font-size="14" font-weight="bold" fill="#4A3728">The Hanged Man</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">매달린 사람</text>
</svg>