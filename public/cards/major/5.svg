<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border5)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">V</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Triple crown, crossed keys, two acolytes -->
  <g transform="translate(120,165)">
    <!-- Pillars -->
    <rect x="-40" y="-40" width="8" height="70" rx="2" fill="#9CA3AF" opacity="0.25"/>
    <rect x="32" y="-40" width="8" height="70" rx="2" fill="#9CA3AF" opacity="0.25"/>
    <!-- Triple crown (tiara) -->
    <rect x="-8" y="-62" width="16" height="6" rx="2" fill="#D4A843" opacity="0.6"/>
    <rect x="-10" y="-56" width="20" height="6" rx="2" fill="#D4A843" opacity="0.5"/>
    <rect x="-12" y="-50" width="24" height="6" rx="2" fill="#D4A843" opacity="0.4"/>
    <!-- Figure -->
    <circle cx="0" cy="-35" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-25" x2="0" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Papal staff / triple cross -->
    <line x1="18" y1="-30" x2="25" y2="-65" stroke="#D4A843" stroke-width="2"/>
    <line x1="20" y1="-60" x2="30" y2="-60" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="21" y1="-52" x2="29" y2="-52" stroke="#D4A843" stroke-width="1.5"/>
    <line x1="22" y1="-44" x2="28" y2="-44" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Blessing hand -->
    <line x1="0" y1="-15" x2="-18" y2="-25" stroke="#8B5CF6" stroke-width="2"/>
    <circle cx="-20" cy="-27" r="4" fill="none" stroke="#8B5CF6" stroke-width="1"/>
    <!-- Crossed keys at bottom -->
    <line x1="-15" y1="20" x2="15" y2="35" stroke="#D4A843" stroke-width="2"/>
    <line x1="15" y1="20" x2="-15" y2="35" stroke="#9CA3AF" stroke-width="2"/>
    <circle cx="-17" cy="36" r="4" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <circle cx="17" cy="36" r="4" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Two acolytes -->
    <circle cx="-22" cy="5" r="5" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
    <line x1="-22" y1="10" x2="-22" y2="25" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
    <circle cx="22" cy="5" r="5" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
    <line x1="22" y1="10" x2="22" y2="25" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="15" font-weight="bold" fill="#4A3728">The Hierophant</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">교황</text>
</svg>