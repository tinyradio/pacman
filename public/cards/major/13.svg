<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border13" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border13)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XIII</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Skeleton on horse, black flag with white rose, sunrise -->
  <g transform="translate(120,168)">
    <!-- Sunrise in background -->
    <circle cx="40" cy="-50" r="15" fill="#FCD34D" opacity="0.15"/>
    <line x1="40" y1="-70" x2="40" y2="-75" stroke="#FCD34D" stroke-width="1" opacity="0.3"/>
    <line x1="55" y1="-55" x2="60" y2="-58" stroke="#FCD34D" stroke-width="1" opacity="0.3"/>
    <line x1="55" y1="-45" x2="60" y2="-42" stroke="#FCD34D" stroke-width="1" opacity="0.3"/>
    <!-- Two towers in background -->
    <rect x="30" y="-55" width="8" height="20" rx="1" fill="#9CA3AF" opacity="0.2"/>
    <rect x="45" y="-50" width="8" height="15" rx="1" fill="#9CA3AF" opacity="0.2"/>
    <!-- Horse body -->
    <ellipse cx="-5" cy="5" rx="25" ry="15" fill="none" stroke="#4A3728" stroke-width="2"/>
    <!-- Horse legs -->
    <line x1="-20" y1="15" x2="-25" y2="40" stroke="#4A3728" stroke-width="2"/>
    <line x1="-10" y1="18" x2="-8" y2="40" stroke="#4A3728" stroke-width="2"/>
    <line x1="5" y1="18" x2="8" y2="40" stroke="#4A3728" stroke-width="2"/>
    <line x1="15" y1="15" x2="20" y2="40" stroke="#4A3728" stroke-width="2"/>
    <!-- Horse head -->
    <path d="M20,0 Q30,-10 25,-25" fill="none" stroke="#4A3728" stroke-width="2"/>
    <circle cx="27" cy="-18" r="3" fill="none" stroke="#4A3728" stroke-width="1"/>
    <!-- Skeleton rider -->
    <circle cx="0" cy="-25" r="8" fill="none" stroke="#4A3728" stroke-width="2"/>
    <!-- Skull features -->
    <circle cx="-3" cy="-27" r="2" fill="#4A3728" opacity="0.5"/>
    <circle cx="3" cy="-27" r="2" fill="#4A3728" opacity="0.5"/>
    <line x1="-2" y1="-22" x2="2" y2="-22" stroke="#4A3728" stroke-width="1"/>
    <!-- Body -->
    <line x1="0" y1="-17" x2="0" y2="-5" stroke="#4A3728" stroke-width="2"/>
    <!-- Armor -->
    <rect x="-6" y="-17" width="12" height="10" rx="1" fill="none" stroke="#4A3728" stroke-width="1"/>
    <!-- Black flag with white rose -->
    <line x1="-10" y1="-15" x2="-25" y2="-60" stroke="#4A3728" stroke-width="2"/>
    <rect x="-45" y="-60" width="22" height="18" rx="1" fill="#1a1a2e" opacity="0.7"/>
    <!-- White rose on flag -->
    <circle cx="-34" cy="-51" r="4" fill="white" opacity="0.7"/>
    <circle cx="-34" cy="-51" r="2" fill="white" opacity="0.9"/>
    <!-- Fallen crown -->
    <path d="M-40,35 L-38,28 L-35,35 L-32,28 L-29,35" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- White rose growing -->
    <line x1="35" y1="40" x2="35" y2="25" stroke="#4ADE80" stroke-width="1"/>
    <circle cx="35" cy="22" r="4" fill="white" opacity="0.6" stroke="#4ADE80" stroke-width="1"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">Death</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">죽음</text>
</svg>