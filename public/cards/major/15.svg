<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border15" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border15)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XV</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Horned figure on pedestal, inverted pentagram, two chained figures -->
  <g transform="translate(120,160)">
    <!-- Dark background suggestion -->
    <rect x="-50" y="-60" width="100" height="100" rx="5" fill="#1a1a2e" opacity="0.05"/>
    <!-- Inverted pentagram above -->
    <polygon points="0,-62 -8,-48 5,-55 -5,-55 8,-48" fill="none" stroke="#DC2626" stroke-width="1.5" opacity="0.5"/>
    <circle cx="0" cy="-55" r="12" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.3"/>
    <!-- Horned figure -->
    <!-- Horns -->
    <line x1="-8" y1="-45" x2="-15" y2="-58" stroke="#4A3728" stroke-width="2"/>
    <line x1="8" y1="-45" x2="15" y2="-58" stroke="#4A3728" stroke-width="2"/>
    <!-- Head -->
    <circle cx="0" cy="-38" r="10" fill="none" stroke="#4A3728" stroke-width="2"/>
    <!-- Body -->
    <line x1="0" y1="-28" x2="0" y2="0" stroke="#4A3728" stroke-width="2"/>
    <!-- Bat wings -->
    <path d="M-8,-25 Q-30,-35 -35,-15 Q-25,-18 -8,-15" fill="#4A3728" opacity="0.1" stroke="#4A3728" stroke-width="1.5"/>
    <path d="M8,-25 Q30,-35 35,-15 Q25,-18 8,-15" fill="#4A3728" opacity="0.1" stroke="#4A3728" stroke-width="1.5"/>
    <!-- Raised hand with torch -->
    <line x1="8" y1="-20" x2="20" y2="-35" stroke="#4A3728" stroke-width="2"/>
    <polygon points="20,-38 17,-30 23,-30" fill="#DC2626" opacity="0.4"/>
    <!-- Pedestal -->
    <rect x="-20" y="0" width="40" height="12" rx="2" fill="#4A3728" opacity="0.15" stroke="#4A3728" stroke-width="1.5"/>
    <!-- Two chained figures -->
    <!-- Left figure -->
    <circle cx="-22" cy="20" r="6" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-22" y1="26" x2="-22" y2="40" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-22" y1="40" x2="-28" y2="50" stroke="#8B5CF6" stroke-width="1.5"/>
    <line x1="-22" y1="40" x2="-16" y2="50" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Chain (loose) -->
    <path d="M-22,22 Q-15,18 -10,12" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Right figure -->
    <circle cx="22" cy="20" r="6" fill="none" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="22" y1="26" x2="22" y2="40" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="22" y1="40" x2="16" y2="50" stroke="#E879A8" stroke-width="1.5"/>
    <line x1="22" y1="40" x2="28" y2="50" stroke="#E879A8" stroke-width="1.5"/>
    <!-- Chain (loose) -->
    <path d="M22,22 Q15,18 10,12" fill="none" stroke="#9CA3AF" stroke-width="1.5"/>
    <!-- Tail hints on chained figures -->
    <path d="M-16,35 Q-10,32 -8,38" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
    <path d="M16,35 Q10,32 8,38" fill="none" stroke="#DC2626" stroke-width="1" opacity="0.4"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Devil</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">악마</text>
</svg>