<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border17" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border17)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XVII</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Large star with seven smaller stars, nude figure pouring water, bird in tree -->
  <g transform="translate(120,160)">
    <!-- Large eight-pointed star -->
    <polygon points="0,-55 4,-45 14,-45 6,-39 9,-29 0,-35 -9,-29 -6,-39 -14,-45 -4,-45" fill="#FCD34D" opacity="0.4" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Seven smaller stars -->
    <polygon points="-30,-50 -28,-46 -24,-46 -27,-43 -26,-39 -30,-42 -34,-39 -33,-43 -36,-46 -32,-46" fill="#FCD34D" opacity="0.3"/>
    <polygon points="30,-50 32,-46 36,-46 33,-43 34,-39 30,-42 26,-39 27,-43 24,-46 28,-46" fill="#FCD34D" opacity="0.3"/>
    <polygon points="-40,-35 -38,-31 -34,-31 -37,-28 -36,-24 -40,-27 -44,-24 -43,-28 -46,-31 -42,-31" fill="#FCD34D" opacity="0.3"/>
    <polygon points="40,-35 42,-31 46,-31 43,-28 44,-24 40,-27 36,-24 37,-28 34,-31 38,-31" fill="#FCD34D" opacity="0.3"/>
    <polygon points="-20,-38 -18,-34 -14,-34 -17,-31 -16,-27 -20,-30 -24,-27 -23,-31 -26,-34 -22,-34" fill="#FCD34D" opacity="0.25"/>
    <polygon points="20,-38 22,-34 26,-34 23,-31 24,-27 20,-30 16,-27 17,-31 14,-34 18,-34" fill="#FCD34D" opacity="0.25"/>
    <polygon points="0,-40 2,-36 6,-36 3,-33 4,-29 0,-32 -4,-29 -3,-33 -6,-36 -2,-36" fill="#FCD34D" opacity="0.25"/>
    <!-- Kneeling figure -->
    <circle cx="-5" cy="-10" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="-5" y1="-2" x2="-5" y2="15" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Kneeling leg -->
    <line x1="-5" y1="15" x2="-15" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="-15" y1="25" x2="-5" y2="30" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Extended leg -->
    <line x1="-5" y1="15" x2="10" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Left arm pouring into water -->
    <line x1="-5" y1="5" x2="-25" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="-30" y="6" width="8" height="10" rx="2" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Water streams -->
    <path d="M-26,16 Q-30,25 -35,30 Q-38,35 -40,40" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.4"/>
    <path d="M-24,16 Q-22,25 -25,30 Q-28,35 -30,40" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.3"/>
    <!-- Right arm pouring onto land -->
    <line x1="-5" y1="5" x2="15" y2="10" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="13" y="6" width="8" height="10" rx="2" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Water streams onto land -->
    <path d="M19,16 Q22,25 25,30 Q28,35 30,40" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.4"/>
    <!-- Pool of water -->
    <ellipse cx="-30" cy="38" rx="18" ry="6" fill="#60A5FA" opacity="0.1" stroke="#60A5FA" stroke-width="1"/>
    <!-- Land -->
    <ellipse cx="20" cy="38" rx="18" ry="5" fill="#4ADE80" opacity="0.1"/>
    <!-- Bird in tree (right) -->
    <line x1="40" y1="40" x2="40" y2="15" stroke="#8B6914" stroke-width="2"/>
    <circle cx="40" cy="10" r="8" fill="#4ADE80" opacity="0.15"/>
    <ellipse cx="42" cy="18" rx="4" ry="3" fill="#DC2626" opacity="0.3"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The Star</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">별</text>
</svg>