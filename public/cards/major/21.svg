<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border21" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border21)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XXI</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Dancing figure in laurel wreath, four creatures in corners -->
  <g transform="translate(120,165)">
    <!-- Laurel wreath (oval) -->
    <ellipse cx="0" cy="0" rx="38" ry="50" fill="none" stroke="#4ADE80" stroke-width="4" opacity="0.4"/>
    <ellipse cx="0" cy="0" rx="35" ry="47" fill="none" stroke="#4ADE80" stroke-width="2" opacity="0.2"/>
    <!-- Ribbon ties -->
    <path d="M-10,50 Q-15,55 -20,50" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
    <path d="M10,50 Q15,55 20,50" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
    <path d="M-10,-50 Q-15,-55 -20,-50" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
    <path d="M10,-50 Q15,-55 20,-50" fill="none" stroke="#DC2626" stroke-width="2" opacity="0.4"/>
    <!-- Dancing figure -->
    <circle cx="0" cy="-25" r="8" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-17" x2="0" y2="5" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Flowing sash -->
    <path d="M-5,-10 Q-15,-5 -20,5" fill="none" stroke="#E879A8" stroke-width="2" opacity="0.4"/>
    <path d="M5,-10 Q15,-5 20,5" fill="none" stroke="#E879A8" stroke-width="2" opacity="0.4"/>
    <!-- Arms raised holding wands -->
    <line x1="0" y1="-10" x2="-15" y2="-25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="-15" y1="-25" x2="-18" y2="-30" stroke="#D4A843" stroke-width="2"/>
    <line x1="0" y1="-10" x2="15" y2="-25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="15" y1="-25" x2="18" y2="-30" stroke="#D4A843" stroke-width="2"/>
    <!-- One leg straight, one bent (dance pose) -->
    <line x1="0" y1="5" x2="-8" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="5" x2="10" y2="15" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="10" y1="15" x2="5" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Four creatures of the evangelists in corners -->
    <!-- Top-left: Man/Angel (Aquarius) -->
    <g transform="translate(-48,-50)">
      <circle cx="0" cy="0" r="7" fill="#60A5FA" opacity="0.1" stroke="#60A5FA" stroke-width="1"/>
      <circle cx="0" cy="-2" r="3" fill="none" stroke="#60A5FA" stroke-width="1"/>
      <line x1="-3" y1="3" x2="3" y2="3" stroke="#60A5FA" stroke-width="1"/>
    </g>
    <!-- Top-right: Eagle (Scorpio) -->
    <g transform="translate(48,-50)">
      <circle cx="0" cy="0" r="7" fill="#D4A843" opacity="0.1" stroke="#D4A843" stroke-width="1"/>
      <path d="M-4,2 Q0,-5 4,2" fill="none" stroke="#D4A843" stroke-width="1.5"/>
      <line x1="0" y1="-3" x2="2" y2="-1" stroke="#D4A843" stroke-width="1"/>
    </g>
    <!-- Bottom-left: Bull (Taurus) -->
    <g transform="translate(-48,50)">
      <circle cx="0" cy="0" r="7" fill="#8B6914" opacity="0.1" stroke="#8B6914" stroke-width="1"/>
      <circle cx="0" cy="1" r="4" fill="none" stroke="#8B6914" stroke-width="1"/>
      <path d="M-4,-2 Q-5,-6 -2,-5" fill="none" stroke="#8B6914" stroke-width="1"/>
      <path d="M4,-2 Q5,-6 2,-5" fill="none" stroke="#8B6914" stroke-width="1"/>
    </g>
    <!-- Bottom-right: Lion (Leo) -->
    <g transform="translate(48,50)">
      <circle cx="0" cy="0" r="7" fill="#DC2626" opacity="0.1" stroke="#DC2626" stroke-width="1"/>
      <circle cx="0" cy="0" r="5" fill="none" stroke="#DC2626" stroke-width="1"/>
      <circle cx="0" cy="-1" r="3" fill="none" stroke="#DC2626" stroke-width="0.8"/>
    </g>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">The World</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">세계</text>
</svg>