<svg xmlns="http://www.w3.org/2000/svg" width="240" height="360" viewBox="0 0 240 360">
  <defs>
    <linearGradient id="border14" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D4A843;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="240" height="360" rx="12" fill="#f5f0e8"/>
  <rect x="6" y="6" width="228" height="348" rx="10" fill="none" stroke="url(#border14)" stroke-width="3"/>
  <rect x="14" y="14" width="212" height="332" rx="8" fill="none" stroke="#D4A843" stroke-width="1" stroke-dasharray="4,4"/>
  <circle cx="24" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="24" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="24" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <circle cx="216" cy="336" r="4" fill="#D4A843" opacity="0.6"/>
  <text x="120" y="50" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="bold" fill="#8B5CF6">XIV</text>
  <line x1="60" y1="58" x2="180" y2="58" stroke="#D4A843" stroke-width="1"/>
  <!-- Center: Angel pouring water between two cups, one foot on land one in water -->
  <g transform="translate(120,165)">
    <!-- Wings -->
    <path d="M-10,-45 Q-35,-65 -40,-40 Q-35,-35 -10,-40" fill="#D4A843" opacity="0.1" stroke="#D4A843" stroke-width="1.5"/>
    <path d="M10,-45 Q35,-65 40,-40 Q35,-35 10,-40" fill="#D4A843" opacity="0.1" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Halo / sun circle on forehead -->
    <circle cx="0" cy="-55" r="6" fill="#FCD34D" opacity="0.2" stroke="#D4A843" stroke-width="1"/>
    <!-- Triangle on chest -->
    <polygon points="0,-28 -6,-18 6,-18" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Figure -->
    <circle cx="0" cy="-40" r="10" fill="none" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="-30" x2="0" y2="5" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Robe -->
    <path d="M0,5 Q-12,15 -15,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <path d="M0,5 Q12,15 15,30" fill="none" stroke="#8B5CF6" stroke-width="1.5"/>
    <!-- Left arm holding cup -->
    <line x1="0" y1="-20" x2="-25" y2="-10" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="-30" y="-15" width="10" height="12" rx="2" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Right arm holding cup -->
    <line x1="0" y1="-20" x2="25" y2="-5" stroke="#8B5CF6" stroke-width="2"/>
    <rect x="20" y="-8" width="10" height="12" rx="2" fill="none" stroke="#D4A843" stroke-width="1.5"/>
    <!-- Water flowing between cups -->
    <path d="M-22,-5 Q0,-15 22,-3" fill="none" stroke="#60A5FA" stroke-width="2" opacity="0.6"/>
    <path d="M-20,-3 Q0,-12 20,-1" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.4"/>
    <!-- One foot on land, one in water -->
    <line x1="0" y1="5" x2="-10" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <line x1="0" y1="5" x2="10" y2="25" stroke="#8B5CF6" stroke-width="2"/>
    <!-- Land -->
    <ellipse cx="-15" cy="30" rx="15" ry="5" fill="#8B6914" opacity="0.15"/>
    <!-- Water -->
    <ellipse cx="15" cy="30" rx="15" ry="5" fill="#60A5FA" opacity="0.15"/>
    <path d="M5,30 Q10,27 15,30 Q20,33 25,30" fill="none" stroke="#60A5FA" stroke-width="1" opacity="0.3"/>
    <!-- Irises/flowers -->
    <circle cx="-30" cy="25" r="3" fill="#8B5CF6" opacity="0.3"/>
    <circle cx="-35" cy="20" r="3" fill="#8B5CF6" opacity="0.3"/>
    <!-- Path to mountains -->
    <path d="M0,35 Q10,38 15,45" fill="none" stroke="#D4A843" stroke-width="1" opacity="0.3"/>
    <!-- Sun on horizon -->
    <circle cx="0" cy="-70" r="8" fill="#FCD34D" opacity="0.15"/>
  </g>
  <line x1="60" y1="290" x2="180" y2="290" stroke="#D4A843" stroke-width="1"/>
  <text x="120" y="312" text-anchor="middle" font-family="Georgia, serif" font-size="16" font-weight="bold" fill="#4A3728">Temperance</text>
  <text x="120" y="334" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#8B5CF6">절제</text>
</svg>